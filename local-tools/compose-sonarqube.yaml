services:
  sonarqube:
    image: sonarqube:community
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    container_name: sonarqube_local
    restart: always
    ports:
      - "9000:9000"
    networks:
      - sonarnet
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db_sonar:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_password
      # Ajustamos los umbrales de disco (Watermarks)
      - SONAR_SEARCH_JAVAOPTS=-Dcluster.routing.allocation.disk.threshold_enabled=true -Dcluster.routing.allocation.disk.watermark.low=95% -Dcluster.routing.allocation.disk.watermark.high=98% -Dcluster.routing.allocation.disk.watermark.flood_stage=99%
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - db_sonar

  db_sonar:
    image: postgres:15
    container_name: postgres_sonar
    restart: always
    networks:
      - sonarnet
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_password
      - POSTGRES_DB=sonar
    volumes:
      - postgresql_sonar_data:/var/lib/postgresql/data

networks:
  sonarnet:

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_sonar_data:
